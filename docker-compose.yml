services:
  postgres:
    image: postgres:16-alpine
    container_name: adi-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: adi
    volumes:
      - adi_pgdata:/var/lib/postgresql/data

volumes:
  adi_pgdata:
